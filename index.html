<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="shortcut icon" href="./assite/logo.png" type="image/x-icon">
    <!-- Google Font Here -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- Css file Here -->
 <link rel="stylesheet" href="./css/style.css">
 <!-- Tailwind and Daisy Ui  -->
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

   <!-- DaisyUI Link -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

</head>
<body class="mx-auto max-w-7xl">
    <h1 class="bg-amber-400 ">Hello</h1>
   <!-- Header Section started here-->
   <header >
    <div class=" mx-auto w-[95%] ">
        <h1 class="text-[#002C5C] text-4xl font-bold">Job Application Tracker</h1>
    <div class="grid grid-cols-3 gap-5 mt-5">
        <div class=" border border-[#F1F2F4] bg-white p-5 rounded-md">
            <p class="text-[#323B49] font-medium text-sm " >Total</p>
            <p class="text-2xl font-bold text-[#002B70]"id="total-counter" >0</p>
        </div>

        <div class=" border border-[#F1F2F4] bg-white p-5 rounded-md">
            <p class="text-[#323B49] font-medium text-sm " >Interview</p>
            <p class="text-2xl font-bold text-[#10B981]" id="interview-counter">0</p>
        </div>

        <div class=" border border-[#F1F2F4] bg-white p-5 rounded-md">
            <p class="text-[#323B49] font-medium text-sm " >Rejected</p>
            <p class="text-2xl font-bold text-[#EF4444]" id="rejected-counter">0</p>
        </div>

    </div>
    <hr class=" text-[#E6E7E9] border-1 my-6">
    </div>
</header>

   <!-- Header Section started here-->

  


</body>
</html>
